name: freqpose
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  - numpy=1.26
  - scipy
  - matplotlib
  - pandas
  - pillow
  - opencv
  - cython
  - ninja
  - git
  - pip:
      - openmim
      - mmengine==0.10.7
      - mmcv==2.1.0
      - mmdet==3.2.0
      - mmpose==1.3.2
      - pycocotools
      - xtcocotools
      - tensorboard
      - ultralytics
      - json-tricks
      - shapely
      - tqdm
      - rich
